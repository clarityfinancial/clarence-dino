<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;

    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;

    overscroll-behavior: none;
  }

    width: 800px;
    max-width: 100vw;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: auto;
    touch-action: none;
  }

  .hint {
    text-align: center;
    color: #999;
    font-size: 14px;
    margin-top: 16px;
    transition: opacity 0.3s;
  }

  .hint.hidden { opacity: 0; }

  @media (max-height: 500px) and (orientation: landscape) {
    .four-oh-four { display: none; }
    body { justify-content: flex-start; padding-top: 8px; }
    .hint { margin-top: 4px; font-size: 12px; }
  }

  @media (max-width: 500px) {
    .four-oh-four h1 { font-size: 32px; }
    .four-oh-four p { font-size: 14px; }
    .four-oh-four { margin-bottom: 12px; }
    .hint { font-size: 12px; }
  }

  body.night {
    background: #1a1a2e;
  }

  body.night .four-oh-four h1 {
    color: #ddd;
  }

  body.night .four-oh-four p {
    color: #777;
  }

  body.night .hint {
    color: #666;
  }

  @media (prefers-reduced-motion: reduce) {
    .hint { transition: none; }
  }

  .four-oh-four {
    text-align: center;
    margin-bottom: 24px;
  }

  .four-oh-four h1 {
    font-size: 48px;
    color: #535353;
    letter-spacing: 4px;
  }

  .four-oh-four p {
    font-size: 16px;
    color: #999;
    margin-top: 8px;
  }
</style>

  // ─── Clarence Drawing ──────────────────────────────────────────────

  function drawPlayer() {
    if (!clarenceReady) return;
    const sprite = clarenceImg;

    const px = PLAYER.x;
    const cx = px + CLARENCE_W / 2;
    const cy = PLAYER.y;

    ctx.save();

    if (gameState === 'dead') {
      ctx.translate(cx, cy);
      ctx.rotate(0.4);
      ctx.translate(-cx, -cy);
      ctx.drawImage(sprite, px - 2, cy - CLARENCE_H, CLARENCE_W, CLARENCE_H);
      ctx.restore();
      return;
    }

    if (PLAYER.ducking) {
      const dw = CONFIG.DUCK_W;
      const dh = CONFIG.DUCK_H;
      const dx = px - (dw - CLARENCE_W) / 2;
      const dy = cy - dh;
      ctx.drawImage(sprite, dx, dy, dw, dh);
      ctx.restore();
      return;
    }

    if (PLAYER.y < GROUND_Y) {
      ctx.translate(cx, cy);
      ctx.rotate(-0.15);
      ctx.translate(-cx, -cy);
      ctx.drawImage(sprite, px, cy - CLARENCE_H, CLARENCE_W, CLARENCE_H);
      ctx.restore();
      return;
    }

    if (gameState === 'idle') {
      ctx.drawImage(sprite, px, cy - CLARENCE_H, CLARENCE_W, CLARENCE_H);
      ctx.restore();
      return;
    }

    const bob = Math.sin(frameCount * 0.3) * 3;
    const tilt = Math.sin(frameCount * 0.3) * 0.06;
    ctx.translate(cx, cy);
    ctx.rotate(tilt);
    ctx.translate(-cx, -cy);
    ctx.drawImage(sprite, px, cy - CLARENCE_H + bob, CLARENCE_W, CLARENCE_H);

    ctx.restore();
  }

    ctx.lineWidth = 1;
    ctx.strokeRect(x + 3, y + 15, 6, 6);
    ctx.strokeRect(x + 21, y + 15, 6, 6);

    // flag
    ctx.fillStyle = '#2980b9';
    ctx.fillRect(x + 23, y - 22, 8, 5);
  }

  function drawTinySchool(x, y) {
    // main building
    ctx.fillStyle = redWall();
    ctx.fillRect(x, y + 8, 22, 20);
    // white trim strip
    ctx.fillStyle = whiteTrim();
    ctx.fillRect(x, y + 8, 22, 2);
    // roof
    ctx.fillStyle = redRoof();
    ctx.beginPath();
    ctx.moveTo(x - 1, y + 8);
    ctx.lineTo(x + 11, y);
    ctx.lineTo(x + 23, y + 8);
    ctx.closePath();
    ctx.fill();
    // door
    ctx.fillStyle = doorColor();
    ctx.fillRect(x + 8, y + 18, 6, 10);
    ctx.fillStyle = '#d4af37';
    ctx.fillRect(x + 13, y + 22, 1, 2);
    // windows
    ctx.fillStyle = windowColor();
    ctx.fillRect(x + 3, y + 12, 5, 5);
    ctx.fillRect(x + 14, y + 12, 5, 5);
    clearWindowGlow();
    // white window frames
    ctx.strokeStyle = whiteTrim();
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 3, y + 12, 5, 5);
    ctx.strokeRect(x + 14, y + 12, 5, 5);
  }

  // ─── Flying Obstacles ────────────────────────────────────────────

  function drawGradCap(x, y, frame) {
    const bob = Math.sin(frame * 0.12) * 3;
    const tilt = Math.sin(frame * 0.08) * 0.1;
    ctx.save();
    ctx.translate(x + 16, y + 10 + bob);
    ctx.rotate(tilt);
    // board (diamond shape from above)
    ctx.fillStyle = nightMode ? '#222' : '#2c3e50';
    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.lineTo(18, 0);
    ctx.lineTo(0, 6);
    ctx.lineTo(-18, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = nightMode ? '#555' : '#34495e';
    ctx.lineWidth = 1;
    ctx.stroke();
    // cap base
    ctx.fillStyle = nightMode ? '#333' : '#34495e';
    ctx.fillRect(-8, 0, 16, 6);
    // tassel
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, -1);
    ctx.lineTo(14, 2);
    ctx.lineTo(14, 12);
    ctx.stroke();
    ctx.fillStyle = '#d4af37';
    ctx.beginPath();
    ctx.arc(14, 13, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  const obstacleTypes = [
    { type: 'tinySchool', width: 22, height: 28, groundOffset: 28 },
    { type: 'smallSchool', width: 30, height: 36, groundOffset: 36 },
    { type: 'largeSchool', width: 46, height: 36, groundOffset: 36 },
    { type: 'schoolPair', width: 56, height: 28, groundOffset: 28 },
    { type: 'gradCap', width: 36, height: 22, groundOffset: 0, flying: true },
  ];

  function spawnObstacle() {
    let typeIdx;
    if (Math.random() < CONFIG.FLYING_CHANCE && score > CONFIG.FLYING_MIN_SCORE) {
      typeIdx = 4;
    } else {
      typeIdx = Math.floor(Math.random() * 4);
    }

    const def = obstacleTypes[typeIdx];
    let y = GROUND_Y - def.groundOffset;

    if (def.flying) {
      const heights = [GROUND_Y - 70, GROUND_Y - 90, GROUND_Y - 110];
      y = heights[Math.floor(Math.random() * heights.length)];
    }

    obstacles.push({
      x: W + 20,
      y,
      width: def.width,
      height: def.height,
      type: def.type,
      flying: !!def.flying,
      frame: 0,
      frameTimer: 0,
    });
  }

  function drawObstacle(obs) {
    switch (obs.type) {
      case 'tinySchool':
        drawTinySchool(obs.x, obs.y);
        break;
      case 'smallSchool':
        drawSmallSchool(obs.x, obs.y);
        break;
      case 'largeSchool':
        drawLargeSchool(obs.x, obs.y);
        break;
      case 'schoolPair':
        drawTinySchool(obs.x, obs.y);
        drawTinySchool(obs.x + 28, obs.y);
        break;
      case 'gradCap':
        drawGradCap(obs.x, obs.y, obs.frame);
        break;
    }
  }

  // ─── Clouds ───────────────────────────────────────────────────────

  function drawCloud(x, y) {
    ctx.fillStyle = nightMode ? '#444' : '#e8e8e8';
    const s = 2;
    ctx.fillRect(x + 6*s, y, 14*s, 4*s);
    ctx.fillRect(x + 2*s, y + 2*s, 22*s, 4*s);
    ctx.fillRect(x, y + 4*s, 26*s, 4*s);
  }

  function initClouds() {
    for (let i = 0; i < 4; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 20 + Math.random() * 60,
        speed: 0.5 + Math.random() * 0.5,
      });
    }
  }

  // ─── Ground ───────────────────────────────────────────────────────

  function drawGround() {
    ctx.fillStyle = nightMode ? '#888' : '#535353';
    ctx.fillRect(0, GROUND_Y, W, 2);

    // ground texture bumps
    const bumpSpacing = 20;
    const totalBumps = Math.ceil(W / bumpSpacing) + 2;
    for (let i = 0; i < totalBumps; i++) {
      const bx = ((i * bumpSpacing - groundOffset) % (W + bumpSpacing * 2) + W + bumpSpacing * 2) % (W + bumpSpacing * 2) - bumpSpacing;
      const hash = Math.sin(i * 127.1) * 43758.5453;
      const h = (hash - Math.floor(hash));
      if (h > 0.5) {
        ctx.fillRect(bx, GROUND_Y + 4 + h * 6, 3, 1);
      }
      if (h > 0.3 && h < 0.6) {
        ctx.fillRect(bx + 8, GROUND_Y + 8, 5, 1);
      }
    }
  }

  // ─── Score Display ────────────────────────────────────────────────

  function drawScore() {
    ctx.fillStyle = nightMode ? '#ddd' : '#535353';
    ctx.font = '16px "Courier New", monospace';
    ctx.textAlign = 'right';

    const scoreStr = String(Math.floor(score)).padStart(5, '0');
    const hiStr = 'HI ' + String(highScore).padStart(5, '0');

    if (highScore > 0) {
      ctx.fillStyle = nightMode ? '#666' : '#aaa';
      ctx.fillText(hiStr, W - 100, 24);
    }

    ctx.fillStyle = nightMode ? '#ddd' : '#535353';
    ctx.fillText(scoreStr, W - 16, 24);
  }

  // ─── Game Over ────────────────────────────────────────────────────

  function drawGameOver() {
    ctx.fillStyle = nightMode ? '#ddd' : '#535353';
    ctx.font = '20px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('G A M E   O V E R', W / 2, H / 2 - 30);

    // restart icon (simple arrow)
    const cx = W / 2, cy = H / 2;
    ctx.strokeStyle = nightMode ? '#ddd' : '#535353';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI * 1.6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + 10, cy - 14);
    ctx.lineTo(cx + 16, cy - 8);
    ctx.lineTo(cx + 6, cy - 8);
    ctx.fill();
  }

  // ─── Collision Detection ──────────────────────────────────────────

  function checkCollision() {
    const pw = PLAYER.ducking ? CONFIG.DUCK_W : PLAYER.width;
    const ph = PLAYER.ducking ? CONFIG.DUCK_H : PLAYER.height;
    const px = PLAYER.x + CONFIG.HITBOX_INSET_X;
    const py = PLAYER.y - ph + CONFIG.HITBOX_INSET_Y;
    const prw = pw - CONFIG.HITBOX_SHRINK_W;
    const prh = ph - CONFIG.HITBOX_SHRINK_H;

    for (const obs of obstacles) {
      const ox = obs.x + 4;
      const oy = obs.y;
      const ow = obs.width - 8;
      const oh = obs.height - 4;

      if (px < ox + ow && px + prw > ox && py < oy + oh && py + prh > oy) {
        return true;
      }
    }
    return false;
  }

  // ─── Input ────────────────────────────────────────────────────────

  const keys = {};

  function handleAction(action) {
    if (action === 'jump') {
      if (gameState === 'idle') {
        gameState = 'running';
        needsRedraw = true;
        document.getElementById('hint').classList.add('hidden');
      }
      if (gameState === 'dead') {
        resetGame();
        gameState = 'running';
        return;
      }
      if (PLAYER.y >= GROUND_Y && !PLAYER.ducking) {
        PLAYER.vy = CONFIG.JUMP_FORCE;
      }
    }
    if (action === 'duck' && gameState === 'running') {
      if (PLAYER.y >= GROUND_Y - 2) {
        PLAYER.ducking = true;
      } else {
        PLAYER.vy += 1;
      }
    }
  }

  function handleActionEnd(action) {
    if (action === 'duckEnd') {
      PLAYER.ducking = false;
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (!keys[e.code]) handleAction('jump');
      keys[e.code] = true;
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      if (!keys[e.code]) handleAction('duck');
      keys[e.code] = true;
    }
  });

  document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    if (e.code === 'ArrowDown') {
      handleActionEnd('duckEnd');
    }
  });

  let touchStartY = 0;
  let touchStartTime = 0;
  let touchActive = false;
  let touchDucking = false;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchStartY = touch.clientY;
    touchStartTime = performance.now();
    touchActive = true;
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!touchActive) return;
    const touch = e.touches[0];
    const dy = touch.clientY - touchStartY;
    if (dy > 30) {
      handleAction('duck');
      touchDucking = true;
      touchActive = false;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!touchActive) return;
    touchActive = false;
    const elapsed = performance.now() - touchStartTime;
    if (elapsed < 300) {
      handleAction('jump');
    }
    touchDucking = false;
    handleActionEnd('duckEnd');
  }, { passive: false });

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    handleAction('jump');
  });

  document.addEventListener('touchmove', (e) => {
    if (e.target === canvas) e.preventDefault();
  }, { passive: false });

  // ─── Game Logic ───────────────────────────────────────────────────

  let nextObstacleIn = 100;

  function resetGame() {
    PLAYER.y = GROUND_Y;
    PLAYER.vy = 0;
    PLAYER.ducking = false;
    obstacles = [];
    score = 0;
    speed = CONFIG.INITIAL_SPEED;
    nextObstacleIn = 100;
    nightMode = false;
    frameCount = 0;
    needsRedraw = true;
  }

  function update(dt) {
    if (gameState !== 'running') return;

    frameCount++;
    needsRedraw = true;

    PLAYER.vy += CONFIG.GRAVITY * dt;
    PLAYER.y += PLAYER.vy * dt;
    if (PLAYER.y >= GROUND_Y) {
      PLAYER.y = GROUND_Y;
      PLAYER.vy = 0;
      if ((keys['ArrowDown'] || touchDucking) && !PLAYER.ducking) {
        PLAYER.ducking = true;
      }
    }

    speed = Math.min(CONFIG.MAX_SPEED, CONFIG.INITIAL_SPEED + score * CONFIG.ACCELERATION);
    score += speed * CONFIG.SCORE_RATE * dt;
    nightMode = Math.floor(score / CONFIG.NIGHT_CYCLE) % 2 === 1;

    groundOffset = (groundOffset + speed * dt) % W;

    for (const cloud of clouds) {
      cloud.x -= cloud.speed * dt;
      if (cloud.x < -60) {
        cloud.x = W + Math.random() * 100;
        cloud.y = 20 + Math.random() * 60;
      }
    }

    nextObstacleIn -= speed * dt;
    if (nextObstacleIn <= 0) {
      spawnObstacle();
      const speedFactor = speed / CONFIG.INITIAL_SPEED;
      const baseMin = Math.max(250 * speedFactor, 400 - speed * 4);
      const baseMax = Math.max(400 * speedFactor, 700 - speed * 6);
      let gap = baseMin + Math.random() * (baseMax - baseMin);
      if (Math.random() < 0.2) gap += (100 + Math.random() * 150) * speedFactor;
      nextObstacleIn = gap;
    }

    let writeIdx = 0;
    for (let i = 0; i < obstacles.length; i++) {
      const obs = obstacles[i];
      obs.x -= speed * dt;
      if (obs.flying) obs.frame++;
      if (obs.x > -60) {
        obstacles[writeIdx++] = obs;
      }
    }
    obstacles.length = writeIdx;

    if (checkCollision()) {
      gameState = 'dead';
      if (Math.floor(score) > highScore) {
        highScore = Math.floor(score);
        safeSetItem('clarity-runner-hi', String(highScore));
      }
    }
  }

  // ─── Render ───────────────────────────────────────────────────────

  function render() {
    if (!needsRedraw) return;
    needsRedraw = false;

    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    document.body.classList.toggle('night', nightMode);
    ctx.fillStyle = nightMode ? '#1a1a2e' : '#f7f7f7';
    ctx.fillRect(0, 0, W, H);

    // clouds
    for (const cloud of clouds) {
      drawCloud(cloud.x, cloud.y);
    }

    // ground
    drawGround();

    // obstacles
    for (const obs of obstacles) {
      drawObstacle(obs);
    }

    // player
    drawPlayer();

    // score
    drawScore();

    // game over
    if (gameState === 'dead') {
      drawGameOver();
    }
  }

  // ─── Game Loop ────────────────────────────────────────────────────

  function gameLoop(timestamp) {
    const elapsed = timestamp - lastTimestamp;
    lastTimestamp = timestamp;

    const dt = Math.min(elapsed / FRAME_MS, 3);

    update(dt);
    render();
    requestAnimationFrame(gameLoop);
  }

  initClouds();
  requestAnimationFrame((ts) => {
    lastTimestamp = ts;
    gameLoop(ts);
  });
})();
</script>
</body>
</html>
